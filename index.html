<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}

#overlay{

position:absolute;
left:20px;
top:20px;

width:420px;

background:rgba(15,15,15,.85);

border:3px solid #53fc18;

border-radius:25px;

padding:20px;

color:white;

box-shadow:0 0 30px #53fc18;
}

#header{

display:flex;

align-items:center;

gap:15px;
}

#cacahuete{

width:120px;

animation:float 3s ease-in-out infinite;
}

@keyframes float{

0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.title{

font-size:30px;

font-weight:bold;

color:#53fc18;
}

.stat{

margin-top:18px;

font-size:24px;
}

#progress{

width:100%;

height:35px;

background:#222;

border-radius:30px;

overflow:hidden;

margin-top:20px;
}

#bar{

height:100%;

width:0%;

background:#53fc18;

transition:1s;
}

#viewersText{

text-align:center;

margin-top:10px;

font-size:22px;
}

</style>
</head>

<body>

<div id="overlay">

<div id="header">

<img
id="cacahuete"
src="https://raw.githubusercontent.com/ellstream/overlay-cacahuete/main/cacahuete_ellstream_kick.png"
/>

<div class="title">
🥜 CACAHUÈTE CASINO
</div>

</div>

<div class="stat" id="mega">
🎰 Mega Spin : 0 / 10
</div>

<div class="stat" id="golden">
🎟 Golden Tickets : 0
</div>

<div class="stat" id="roi">
👑 Roi : Aucun
</div>

<div id="progress">
<div id="bar"></div>
</div>

<div id="viewersText">
0 / 50 viewers
</div>

</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSScVihkW4AxYZ2yvxfcKHDaYDkJTq6BRVuGscjPq1HLVL8YaiT5DGpLRnzI3T-hcjwIYmtCnUsSPG1/pub?gid=0&single=true&output=csv";

async function loadData(){

    try{

        const response = await fetch(SHEET_URL);

        const csv = await response.text();

        console.log(csv);

        const rows = csv.trim().split("\n");

        const data = {};

        rows.forEach(row => {

            const firstComma = row.indexOf(",");

            if(firstComma !== -1){

                const key = row.substring(0, firstComma).trim();

                const value = row.substring(firstComma + 1)
                    .replace(/"/g,"")
                    .trim();

                data[key] = value;
            }

        });

        document.getElementById("mega").innerText =
            "🎰 Mega Spin : " + (data["Mega Spin"] || "0/10");

        document.getElementById("golden").innerText =
            "🎟 Golden Tickets : " + (data["Golden Tickets"] || "0");

        document.getElementById("roi").innerText =
            "👑 Roi : " + (data["Roi"] || "Aucun");

        const verif = data["Vérification"] || "0/50";

        document.getElementById("viewersText").innerText =
            verif + " viewers";

        const current =
            parseFloat(verif.split("/")[0].replace(",", "."));

        const percent = Math.min((current / 50) * 100, 100);

        document.getElementById("bar").style.width =
            percent + "%";

    }
    catch(err){

        console.error("Erreur :", err);

    }

}

loadData();

setInterval(loadData,10000);

</script>
</body>
</html>
