<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
overflow:hidden;
}

#overlay{

position:absolute;
left:20px;
top:20px;

width:420px;

background:rgba(15,15,15,.85);

border:3px solid #53fc18;

border-radius:25px;

padding:20px;

color:white;

box-shadow:0 0 30px #53fc18;
}

#header{

display:flex;

align-items:center;

gap:15px;
}

#cacahuete{

width:120px;

animation:float 3s ease-in-out infinite;
}

@keyframes float{

0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

@keyframes flash{
 0%{opacity:1;}
 50%{opacity:.3;}
 100%{opacity:1;}
}    

.title{

font-size:30px;

font-weight:bold;

color:#53fc18;
}

.stat{

margin-top:18px;

font-size:24px;
}

#progress{

width:100%;

height:35px;

background:#222;

border-radius:30px;

overflow:hidden;

margin-top:20px;
}

#bar{

height:100%;

width:0%;

background:#53fc18;

transition:1s;
}
    
#viewersText{

text-align:center;

margin-top:10px;

font-size:22px;
}
</style>
</head>

<body>

<div id="overlay">

<div id="header">

<img
id="cacahuete"
src="https://raw.githubusercontent.com/ellstream/overlay-cacahuete/main/cacahuete_ellstream_kick.png"
/>

<div class="title">
🥜 CACAHUÈTE CASINO
</div>

</div>

<div class="stat" id="mega">
🎰 Mega Spin : 0 / 10
</div>

<div id="megaRemaining" style="
margin-top:8px;
font-size:18px;
color:#53fc18;
font-weight:bold;">
⭐ 10 subs restants
</div>

<div id="megaReady" style="
display:none;
margin-top:10px;
font-size:26px;
font-weight:bold;
color:#53fc18;
text-align:center;
animation:flash 1s infinite;">
🔥 MEGA SPIN DISPONIBLE 🔥
</div>

<div class="stat" id="golden">
🎟 Golden Tickets : 0
</div>

<div class="stat" id="roi">
👑 Roi : Aucun
</div>

<div id="progress">
<div id="bar"></div>
</div>

<div id="viewersText">
0 / 50 viewers
</div>

</div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSScVihkW4AxYZ2yvxfcKHDaYDkJTq6BRVuGscjPq1HLVL8YaiT5DGpLRnzI3T-hcjwIYmtCnUsSPG1/pub?gid=0&single=true&output=csv";

async function loadData(){

    try{

        const response = await fetch(
            SHEET_URL + "&t=" + Date.now()
        );

        const csv = await response.text();
        console.log(csv);
       
        const rows = csv.trim().split("\n");

        const data = {};

        rows.forEach(row => {

       const firstComma = row.indexOf(",");

       if(firstComma !== -1){

       const key = row.substring(0, firstComma)
             .replace(/"/g,"")
             .trim();

       const value = row.substring(firstComma + 1)
            .replace(/"/g,"")
            .trim();

        data[key] = value;
    }

});
        
console.log(data); console.log(Object.keys(data));

const megaText = data["Mega Spin"] || "0/10";

document.getElementById("mega").innerText =
    "🎰 Mega Spin : " + megaText;

const megaCurrent =
    parseFloat(megaText.split("/")[0]) || 0;

const restant =
    Math.max(0, 10 - megaCurrent);

document.getElementById("megaRemaining").innerText =
    "⭐ " + restant + " subs restants avant le Mega Spin";

if(megaCurrent >= 10){

    document.getElementById("megaReady").style.display =
        "block";

}else{

    document.getElementById("megaReady").style.display =
        "none";

}

document.getElementById("golden").innerText =
    "🎟 Golden Tickets : " + (data["Golden Tickets"] || "0");

document.getElementById("roi").innerText =
    "👑 Roi : " + (data["Roi"] || "Aucun");

let verif =
    data["Vérification"] ||
    data["Viewers"] ||
    "0/50";

verif = verif.replace(/\s/g, "");

document.getElementById("viewersText").innerText =
    "🚀 " + verif + " viewers";

const current = Number(verif.split("/")[0]) || 0;

const max = Number(verif.split("/")[1]) || 50;

const percent = Math.min((current / max) * 100, 100);

document.getElementById("bar").style.width =
    percent + "%";

    } catch(err){

        console.error(err);

    }

}

loadData();

setInterval(loadData, 10000);

</script>
</body>
</html>
