<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    background:transparent;
    font-family:Arial,sans-serif;
}

#panel{
    position:absolute;
    top:20px;
    left:20px;

    background:rgba(0,0,0,0.7);

    padding:20px;

    border-radius:20px;

    color:white;

    width:350px;
}

.line{
    margin-top:12px;
    font-size:24px;
}
</style>

</head>

<body>

<div id="panel">

<h2>🥜 CASINO DE LA CACAHUÈTE</h2>

<div class="line" id="mega">
🎰 Mega Spin : 0 / 10
</div>

<div class="line" id="golden">
🎟 Golden Tickets : 0 / 5
</div>

<div class="line" id="roi">
👑 Roi : Aucun
</div>

<div class="line" id="viewers">
🚀 Vérification : 0 / 50
</div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSScVihkW4AxYZ2yvxfcKHDaYDkJTq6BRVuGscjPq1HLVL8YaiT5DGpLRnzI3T-hcjwIYmtCnUsSPG1/pub?gid=0&single=true&output=csv";

async function loadData(){

    const response = await fetch(SHEET_URL);
    const csv = await response.text();

    const rows = csv.trim().split('\n');

    const data = {};

    rows.forEach(row => {

        const firstComma = row.indexOf(',');

        const key = row.substring(0, firstComma).trim();

        const value = row.substring(firstComma + 1).replace(/"/g,'').trim();

        data[key] = value;

    });

    document.getElementById("mega").innerText =
        "🎰 Mega Spin : " + (data["Mega Spin"] || "0/10");

    document.getElementById("golden").innerText =
        "🎟 Golden Tickets : " + (data["Golden Tickets"] || "0/10");

    document.getElementById("roi").innerText =
        "👑 Roi : " + (data["Roi"] || "Aucun");

    document.getElementById("viewers").innerText =
        "🚀 Vérification : " + (data["Vérification"] || "0/50");
}

loadData();
setInterval(loadData, 10000);

</script>

</body>
</html>
