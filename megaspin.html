<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CACAHUÈTE CASINO - MEGA SPIN</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="megaSpinContainer">

    <!-- Flèche -->

    <div id="pointer"></div>

    <!-- Roue -->

    <div id="wheelWrapper">

        <svg id="wheel" viewBox="0 0 800 800">

            <g id="wheelGroup">

                <!-- Segments -->
                <path id="seg0"/>
                <path id="seg1"/>
                <path id="seg2"/>
                <path id="seg3"/>
                <path id="seg4"/>
                <path id="seg5"/>
                <path id="seg6"/>
                <path id="seg7"/>
                <path id="seg8"/>
                <path id="seg9"/>
                <path id="seg10"/>
                <path id="seg11"/>

                <!-- Textes -->

                <text id="txt0" class="wheelText"></text>
                <text id="txt1" class="wheelText"></text>
                <text id="txt2" class="wheelText"></text>
                <text id="txt3" class="wheelText"></text>
                <text id="txt4" class="wheelText"></text>
                <text id="txt5" class="wheelText"></text>
                <text id="txt6" class="wheelText"></text>
                <text id="txt7" class="wheelText"></text>
                <text id="txt8" class="wheelText"></text>
                <text id="txt9" class="wheelText"></text>
                <text id="txt10" class="wheelText"></text>
                <text id="txt11" class="wheelText"></text>

            </g>

        </svg>

        <!-- Logo centre -->

    <div id="centerLogo">

    <img
    src="Cacahuete-casino.png"
    alt="Cacahuete Casino">

       </div>

    </div>

    <!-- Résultat -->

    <div id="resultBox">

        🎰 EN ATTENTE DU MEGA SPIN

    </div>

</div>

<script src="wheel.js"></script>
<div id="confetti"></div>
    
</body>
</html>
