<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TEST CARTES</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Impact', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .cards-container { display: flex; gap: 40px; }
        .card { width: 200px; height: 300px; border: 4px solid #53fc18; border-radius: 15px; background: #111; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card-logo { width: 80px; height: 80px; filter: invert(1) sepia(1) hue-rotate(50deg); }
    </style>
</head>
<body>
    <div class="cards-container">
        <div class="card">
            <img src="Roue-scam.png" class="card-logo">
            <span>CARTE A</span>
        </div>
        <div class="card">
            <img src="Roue-scam.png" class="card-logo">
            <span>CARTE B</span>
        </div>
    </div>
</body>
</html>
