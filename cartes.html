<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CARTES DU DESTIN - SCAM INDUSTRIES</title>
    <link rel="stylesheet" href="cartes.css?v=2000">
</head>
<body>
    <div id="app">
        <h1 class="title">⚠️ SALLE INTERDITE : CHOISISSEZ UNE CARTE ⚠️</h1>
        <div class="cards-container">
            <div class="card" id="cardA" onclick="flipCard('A')">
                <div class="card-inner">
                    <div class="card-front"><img src="Roue-scam.png" class="card-logo"><span>CARTE A</span></div>
                    <div class="card-back" id="contentA">Chargement...</div>
                </div>
            </div>
            <div class="card" id="cardB" onclick="flipCard('B')">
                <div class="card-inner">
                    <div class="card-front"><img src="Roue-scam.png" class="logo"><span>CARTE B</span></div>
                    <div class="card-back" id="contentB">Chargement...</div>
                </div>
            </div>
            <div class="card" id="cardC" onclick="flipCard('C')">
                <div class="card-inner">
                    <div class="card-front"><img src="Roue-scam.png" class="logo"><span>CARTE C</span></div>
                    <div class="card-back" id="contentC">Chargement...</div>
                </div>
            </div>
        </div>
    </div>
    <script src="cartes.js"></script>
</body>
</html>
