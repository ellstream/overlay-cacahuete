<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Overlay Apero</title>
    <style>
    body, html { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Impact', sans-serif; }
    
    #apero-wrapper { width: 100vw; height: 100vh; position: relative; }

    .apero-bar {
        width: 100%; height: 120px;
        background: linear-gradient(90deg, #ff4e00, #ffb800);
        display: flex; align-items: center; justify-content: center;
        border-bottom: 8px solid #ffdc00;
        color: #fff; font-size: 50px; text-transform: uppercase;
        text-shadow: 3px 3px 0 #000; position: absolute; top: 0; z-index: 100;
    }

    /* Force l'affichage et la visibilité des verres */
    .glass {
        position: absolute; 
        font-size: 60px;
        animation: float 5s linear infinite;
        pointer-events: none;
        z-index: 99; /* On passe devant tout */
        display: block !important; 
        opacity: 0; /* Commence invisible */
    }

    @keyframes float {
        0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        20% { opacity: 1; } /* Apparaît plus vite */
        80% { opacity: 1; }
        100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
</style>
     </script>
    </div>
</body>
</html>
