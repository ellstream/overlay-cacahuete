<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay Apéro</title>

<style>

body,
html{
margin:0;
padding:0;
width:100%;
height:100%;
background:transparent;
overflow:hidden;
font-family:Impact,sans-serif;
}

<audio id="aperoAudio" src="Aperoson.mp3" preload="auto"></audio>
  
#apero-wrapper{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.apero-bar{

position:absolute;
top:0;
left:0;

width:100%;
height:120px;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(
90deg,
#ff4e00,
#ffb800
);

border-bottom:8px solid #ffdc00;

color:#fff;
font-size:50px;
text-transform:uppercase;

text-shadow:
3px 3px 0 #000;

z-index:100;

}

.glass{

position:absolute;

font-size:60px;

pointer-events:none;

z-index:99;

animation:floatUp linear forwards;

}

@keyframes floatUp{

0%{
transform:
translateY(100vh)
rotate(0deg);

opacity:0;
}

15%{
opacity:1;
}

85%{
opacity:1;
}

100%{
transform:
translateY(-150px)
rotate(360deg);

opacity:0;
}

}

</style>
</head>

<body>

<div id="apero-wrapper">

<div class="apero-bar">
🍻 C'EST L'HEURE DE L'APÉRO ! 🍻
</div>

</div>

<script>

// Lancer le son au chargement
const audio = document.getElementById("aperoAudio");
audio.play().catch(e => console.log("Interaction utilisateur requise pour l'audio"));

const emojis = [
"🍺",
"🍻",
"🍷",
"🥂",
"🍹",
"🍸",
"🥜"
];

function createGlass(){

const glass =
document.createElement("div");

glass.className="glass";

glass.innerHTML=
emojis[
Math.floor(
Math.random()*emojis.length
)
];

glass.style.left =
Math.random()*95+"vw";

glass.style.animationDuration =
(4+Math.random()*4)+"s";

document
.getElementById("apero-wrapper")
.appendChild(glass);

setTimeout(()=>{

glass.remove();

},8000);

}

setInterval(
createGlass,
500
);

</script>

</body>
</html>
