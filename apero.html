<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Overlay Apero</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: sans-serif; }
        .apero-bar {
            width: 100%; height: 120px;
            background: linear-gradient(90deg, #ff4e00, #ffb800);
            display: flex; align-items: center; justify-content: center;
            border-bottom: 8px solid #ffdc00;
            color: #fff; font-size: 48px; font-weight: bold;
            text-transform: uppercase; text-shadow: 3px 3px 0 #000;
        }
    </style>
</head>
<body>
    <div class="apero-bar">🍻 C'EST L'HEURE DE L'APÉRO ! 🥂</div>
</body>
</html>
