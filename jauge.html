<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAUGE CASINO DES DESTINS</title>
    <link rel="stylesheet" href="jauge.css">
</head>
<body>

    <!-- Zone pour la pluie de billets du Palier 5 -->
    <div id="confetti-container"></div>

    <!-- Zone des alertes Pop-up géantes (Palier 4 et 5) -->
    <div id="popupAlerte"></div>

    <!-- Ta Jauge de Progression -->
    <div id="casinoBarContainer">
        <div id="casinoHeader">
            <span class="casinoTitle">🎰 CASINO DES DESTINS</span>
            <span id="casinoLevel">⭐ NIVEAU : 1</span>
        </div>

        <div id="progressWrapper">
            <div id="progressBarFill"></div>
            <div id="progressText">0 / 5 SUBS</div>
        </div>
    </div>

    <script src="jauge.js"></script>
</body>
</html>
