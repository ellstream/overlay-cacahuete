<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Casino Vault</title>

<link rel="stylesheet" href="./jauge.css?v=10">

</head>


<body>


<div id="vault" class="casino">


    <div class="top-line"></div>


    <div class="title">

        🎰 CASINO VAULT

    </div>



    <div class="state" id="etat">

        CASINO

    </div>




    <div class="progress-box">


        <div class="progress-bar">

            <div id="fill"></div>

        </div>


    </div>




    <div class="counter" id="compteur">

        0 / 5

    </div>



    <div class="shine"></div>



    <div class="particles">

        <span>♠</span>
        <span>♦</span>
        <span>♣</span>
        <span>♥</span>

    </div>


</div>




<script src="./jauge.js?v=20"></script>
