<script>

let niveau = 0;
let jackpotEnCours = false;
let premiereActivationInterdite = false;

const frame = document.getElementById("frame");
const message = document.getElementById("message");


// ===============================
// CHANGEMENT DES MODES
// ===============================

function setJetons(value){

    niveau = value;

    frame.className = "webcam-frame";


    // -----------------------------
    // 0 à 2 : CASINO
    // -----------------------------

    if(value <= 2){

        frame.classList.add("casino");

    }



    // -----------------------------
    // 3 à 4 : SALLE INTERDITE
    // -----------------------------

    if(value >= 3 && value < 5){

        frame.classList.add("interdit");


        // Animation de déblocage une seule fois
        if(!premiereActivationInterdite){

            premiereActivationInterdite = true;

            message.classList.remove("show");

            void message.offsetWidth;

            message.classList.add("show");

            createSparks();

        }

    }



    // -----------------------------
    // 5 : JACKPOT
    // -----------------------------

    if(value >= 5 && !jackpotEnCours){

        jackpot();

    }

}



// ===============================
// BRAISES
// ===============================

function createSparks(){

    for(let i=0;i<25;i++){

        let spark=document.createElement("div");

        spark.className="spark";

        spark.style.left =
        Math.random()*100+"%";

        spark.style.animationDelay =
        Math.random()*4+"s";


        frame.appendChild(spark);

    }

}



// ===============================
// JACKPOT
// ===============================

function jackpot(){

    jackpotEnCours=true;


    frame.className =
    "webcam-frame jackpot";


    for(let i=0;i<40;i++){

        let coin=document.createElement("div");

        coin.className="coin";

        coin.innerHTML="🪙";

        coin.style.left =
        Math.random()*100+"%";


        coin.style.animationDelay =
        Math.random()*2+"s";


        frame.appendChild(coin);

    }



    setTimeout(()=>{


        frame.className =
        "webcam-frame interdit";


        jackpotEnCours=false;


    },5000);


}




// ===============================
// CONNEXION GOOGLE SHEET
// ===============================


// REMPLACE CETTE URL PAR TON GOOGLE SHEET CSV

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRzMx8EveEFg84HJSOU5IempyqWc4sshrrzocmTAKNf5yNY8ihEqCnJ4vtyyujEsvRPNN3Uv_uUTzAF/pub?output=csv";



async function lireJetons(){


    try{


        const response =
        await fetch(sheetURL);


        const data =
        await response.text();



        // récupère le premier nombre trouvé

        const valeur =
        parseInt(data.match(/\d+/)[0]);



        if(!isNaN(valeur) && valeur !== niveau){

            setJetons(valeur);

        }


    }

    catch(error){

        console.log(
        "Erreur lecture Google Sheet",
        error
        );

    }


}



// Vérification toutes les 3 secondes

setInterval(
    lireJetons,
    3000
);


// Lecture immédiate au lancement

lireJetons();


</script>
